{% extends 'base.html' %}

{% block title %}{{ titulo }} - Banco{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-lg shadow-xl overflow-hidden">
        <div class="bg-gradient-to-r from-green-500 to-green-700 text-white p-8">
            <h1 class="text-3xl font-bold mb-2">
                <i class="fas fa-{% if tarjeta %}edit{% else %}plus-circle{% endif %} mr-2"></i>
                {{ titulo }}
            </h1>
            <p class="text-green-100">Completa la información de la tarjeta</p>
        </div>

        <div class="p-8">
            <form method="POST" novalidate>
                <div class="mb-8">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">Información básica</h3>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-gray-700 font-bold mb-2">Nombre</label>
                            <input
                                type="text"
                                name="nombre"
                                class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600"
                                placeholder="Ej: Gold Card"
                                required
                                value="{{ tarjeta.nombre if tarjeta else '' }}"
                            >
                        </div>

                        <div>
                            <label class="block text-gray-700 font-bold mb-2">Tipo</label>
                            <select name="tipo" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600" required>
                                {% set tipo_actual = tarjeta.tipo if tarjeta else '' %}
                                <option value="" {% if not tipo_actual %}selected{% endif %}>Selecciona un tipo</option>
                                <option value="estudiante" {% if tipo_actual == 'estudiante' %}selected{% endif %}>Estudiante</option>
                                <option value="joven" {% if tipo_actual == 'joven' %}selected{% endif %}>Joven</option>
                                <option value="clasica" {% if tipo_actual == 'clasica' %}selected{% endif %}>Clasica</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="mb-8 border-t pt-6">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">Costos y requisitos</h3>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-700 font-bold mb-2">CAT (%)</label>
                            <input
                                type="number"
                                name="cat"
                                class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600"
                                step="0.1"
                                min="0"
                                placeholder="35.5"
                                required
                                value="{{ tarjeta.cat if tarjeta else '' }}"
                            >
                        </div>

                        <div>
                            <label class="block text-gray-700 font-bold mb-2">Anualidad</label>
                            <input
                                type="number"
                                name="anualidad"
                                class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600"
                                min="0"
                                step="0.01"
                                placeholder="0"
                                required
                                value="{{ tarjeta.anualidad if tarjeta else '' }}"
                            >
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-gray-700 font-bold mb-2">Edad mínima</label>
                            <input
                                type="number"
                                name="edad_minima"
                                class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600"
                                min="18"
                                max="100"
                                placeholder="18"
                                required
                                value="{{ tarjeta.edad_minima if tarjeta else '' }}"
                            >
                        </div>
                    </div>
                </div>

                <div class="mb-8 border-t pt-6">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">Beneficios e imagen</h3>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-gray-700 font-bold mb-2">Beneficios</label>
                            <textarea
                                name="beneficios"
                                class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600"
                                rows="4"
                                placeholder="Cashback, seguros, descuentos..."
                            >{{ tarjeta.beneficios if tarjeta else '' }}</textarea>
                        </div>

                        <div>
                            <label class="block text-gray-700 font-bold mb-2">URL de imagen (opcional)</label>
                            <input
                                type="url"
                                name="imagen_url"
                                class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600"
                                placeholder="https://ejemplo.com/imagen-tarjeta.jpg"
                                value="{{ tarjeta.imagen_url if tarjeta and tarjeta.imagen_url else '' }}"
                            >
                        </div>
                    </div>
                </div>

                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-green-600 text-white py-4 rounded-lg font-bold text-lg hover:bg-green-700 transition-colors duration-200 shadow-lg">
                        <i class="fas fa-{% if tarjeta %}save{% else %}plus-circle{% endif %} mr-2"></i>
                        {% if tarjeta %}Guardar cambios{% else %}Crear tarjeta{% endif %}
                    </button>
                    <a href="/banco/tarjetas" class="flex-1 bg-gray-200 text-gray-800 py-4 rounded-lg font-bold text-lg hover:bg-gray-300 transition-colors duration-200 text-center">
                        <i class="fas fa-times mr-2"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
